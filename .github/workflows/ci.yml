name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: apps/backend/requirements.txt
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r apps/backend/requirements.txt
        pip install pytest reportlab requests
        
    - name: Run Backend Tests
      run: |
        export PYTHONPATH=apps/backend
        pytest tests/ -v

  frontend-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: apps/web/package-lock.json
        
    - name: Install dependencies
      working-directory: apps/web
      run: npm ci
      
    - name: Lint Next.js
      working-directory: apps/web
      run: npm run lint
      
    - name: Build Next.js
      working-directory: apps/web
      run: npm run build
